<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACEAS — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>ACEAS</h1>
        <p>AI Compliance and Ethics Assessment System</p>
      </div>

      <div id="alert-container"></div>

      <form id="login-form">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="password" class="form-control" placeholder="Your password" required autocomplete="current-password">
            <button class="btn btn-outline-secondary" type="button" id="toggle-password">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="login-btn">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>

      <hr class="my-4">
      <p class="text-center text-muted small mb-0">
        New AI Developer?
        <a href="/views/register.html" class="text-decoration-none fw-semibold">Register here</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    // If already logged in, redirect
    if (ACEAS.getToken() && ACEAS.getUser()) {
      ACEAS.redirectToDashboard(ACEAS.getUser().role);
    }

    document.getElementById('toggle-password').addEventListener('click', () => {
      const pwd = document.getElementById('password');
      const icon = document.querySelector('#toggle-password i');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        pwd.type = 'password';
        icon.className = 'bi bi-eye';
      }
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const alertBox = document.getElementById('alert-container');
      alertBox.innerHTML = '';

      ACEAS.setLoading(btn, true, 'Signing in...');

      try {
        const data = await ACEAS.apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
          }),
        });

        // Store userId for OTP step
        sessionStorage.setItem('otp_user_id', data.userId);
        sessionStorage.setItem('otp_masked_email', data.maskedEmail);

        window.location.href = '/views/verify-otp.html';
      } catch (err) {
        alertBox.innerHTML = `<div class="alert alert-danger"><i class="bi bi-exclamation-triangle me-2"></i>${err.message}</div>`;
        ACEAS.setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
