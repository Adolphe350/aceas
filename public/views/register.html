<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACEAS — Register</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card" style="max-width: 500px;">
      <div class="auth-logo">
        <h1>ACEAS</h1>
        <p>AI Compliance and Ethics Assessment System</p>
      </div>

      <h5 class="fw-bold mb-4 text-center">Create Developer Account</h5>

      <div id="alert-container"></div>

      <form id="register-form">
        <div class="mb-3">
          <label class="form-label fw-semibold">Full Name</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" id="full_name" class="form-control" placeholder="Your full name" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="password" class="form-control" placeholder="Min 8 characters" required minlength="8">
          </div>
          <div class="form-text">Must be at least 8 characters.</div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Confirm Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" id="confirm_password" class="form-control" placeholder="Repeat password" required>
          </div>
        </div>

        <div class="alert alert-info small">
          <i class="bi bi-info-circle me-2"></i>
          Registrations create an <strong>AI Developer</strong> account.
          Compliance officers and admins are created by system administrators.
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="register-btn">
          <i class="bi bi-person-plus me-2"></i>Create Account
        </button>
      </form>

      <hr class="my-4">
      <p class="text-center text-muted small mb-0">
        Already have an account?
        <a href="/views/login.html" class="text-decoration-none fw-semibold">Sign in</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js?v=4"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      const alertBox = document.getElementById('alert-container');
      alertBox.innerHTML = '';

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm_password').value;

      if (password !== confirm) {
        alertBox.innerHTML = '<div class="alert alert-danger">Passwords do not match.</div>';
        return;
      }

      ACEAS.setLoading(btn, true, 'Creating account...');

      try {
        const data = await ACEAS.apiFetch('/auth/register', {
          method: 'POST',
          body: JSON.stringify({
            full_name: document.getElementById('full_name').value.trim(),
            email: document.getElementById('email').value.trim(),
            password,
          }),
        });

        alertBox.innerHTML = `<div class="alert alert-success"><i class="bi bi-check-circle me-2"></i>${data.message}</div>`;
        document.getElementById('register-form').reset();
        setTimeout(() => { window.location.href = '/views/login.html'; }, 2000);
      } catch (err) {
        alertBox.innerHTML = `<div class="alert alert-danger"><i class="bi bi-exclamation-triangle me-2"></i>${err.message}</div>`;
        ACEAS.setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
