<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACEAS — Verify OTP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>ACEAS</h1>
        <p>Two-Factor Verification</p>
      </div>

      <div class="text-center mb-4">
        <div style="font-size: 3rem; color: #0d6efd;"><i class="bi bi-shield-lock"></i></div>
        <h5 class="mt-2 fw-semibold">Enter Verification Code</h5>
        <p class="text-muted small" id="email-hint">A 6-digit code was sent to your email.</p>
      </div>

      <div id="alert-container"></div>

      <form id="otp-form">
        <div class="mb-4">
          <input type="text" id="otp-input" class="form-control otp-input"
            placeholder="000000" maxlength="6" pattern="[0-9]{6}"
            inputmode="numeric" autocomplete="one-time-code" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="verify-btn">
          <i class="bi bi-check-circle me-2"></i>Verify Code
        </button>
      </form>

      <div class="text-center mt-3">
        <span class="text-muted small">Didn't receive the code? </span>
        <button id="resend-btn" class="btn btn-link btn-sm p-0 text-decoration-none fw-semibold" disabled>
          Resend OTP <span id="resend-timer">(60s)</span>
        </button>
      </div>

      <div class="text-center mt-3">
        <a href="/views/login.html" class="text-muted small text-decoration-none">
          <i class="bi bi-arrow-left me-1"></i>Back to login
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js?v=4"></script>
  <script>
    const userId = sessionStorage.getItem('otp_user_id');
    const maskedEmail = sessionStorage.getItem('otp_masked_email');

    if (!userId) {
      window.location.href = '/views/login.html';
    }

    if (maskedEmail) {
      document.getElementById('email-hint').textContent = `A 6-digit code was sent to ${maskedEmail}`;
    }

    // Resend timer
    let resendSeconds = 60;
    const resendBtn = document.getElementById('resend-btn');
    const timerEl = document.getElementById('resend-timer');

    const timer = setInterval(() => {
      resendSeconds--;
      timerEl.textContent = `(${resendSeconds}s)`;
      if (resendSeconds <= 0) {
        clearInterval(timer);
        resendBtn.disabled = false;
        timerEl.textContent = '';
      }
    }, 1000);

    resendBtn.addEventListener('click', async () => {
      resendBtn.disabled = true;
      timerEl.textContent = '(sending...)';
      try {
        const data = await ACEAS.apiFetch('/auth/resend-otp', {
          method: 'POST',
          body: JSON.stringify({ userId }),
        });
        ACEAS.showToast(data.message, 'success');
        resendSeconds = 60;
        const newTimer = setInterval(() => {
          resendSeconds--;
          timerEl.textContent = `(${resendSeconds}s)`;
          if (resendSeconds <= 0) {
            clearInterval(newTimer);
            resendBtn.disabled = false;
            timerEl.textContent = '';
          }
        }, 1000);
      } catch (err) {
        ACEAS.showToast(err.message, 'danger');
        resendBtn.disabled = false;
        timerEl.textContent = '';
      }
    });

    // Auto-format OTP input
    document.getElementById('otp-input').addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
    });

    document.getElementById('otp-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('verify-btn');
      const alertBox = document.getElementById('alert-container');
      alertBox.innerHTML = '';

      const otp = document.getElementById('otp-input').value.trim();
      if (otp.length !== 6) {
        alertBox.innerHTML = '<div class="alert alert-warning">Please enter a 6-digit code.</div>';
        return;
      }

      ACEAS.setLoading(btn, true, 'Verifying...');

      try {
        const data = await ACEAS.apiFetch('/auth/verify-otp', {
          method: 'POST',
          body: JSON.stringify({ userId, otp }),
        });

        ACEAS.setToken(data.token);
        ACEAS.setUser(data.user);
        sessionStorage.removeItem('otp_user_id');
        sessionStorage.removeItem('otp_masked_email');

        ACEAS.showToast('Login successful! Redirecting...', 'success');
        setTimeout(() => ACEAS.redirectToDashboard(data.user.role), 800);
      } catch (err) {
        alertBox.innerHTML = `<div class="alert alert-danger"><i class="bi bi-exclamation-triangle me-2"></i>${err.message}</div>`;
        document.getElementById('otp-input').value = '';
        ACEAS.setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
