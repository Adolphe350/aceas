version: '3.8'
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DISABLE_OTP=true
    env_file:
      - .env
    depends_on:
      - db
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: aceas_db
      POSTGRES_USER: aceas_user
      POSTGRES_PASSWORD: aceas_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./models/db.sql:/docker-entrypoint-initdb.d/init.sql
volumes:
  pgdata:
